  intro: >
    Jie Huang (b. February 1998, Kaizhou, Chongqing) received the B.E. degree in
    Mechatronic Engineering. He is currently a third-year Ph.D. student
    (combined Master–Ph.D.) at Shandong University of Technology.
    His research focuses on robotic vision perception and precision operations.
    As first author, he has published five papers, including two SCI Q1 TOP
    journals (IF 8.0 and 8.9), one SCI Q2 paper, and two EI-indexed papers
    (one Chinese leading venue and one English EI).
